<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>噩梦幸存者</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @media (orientation: portrait) {
      #rotateWrap {
        position: fixed;
        top: 0; left: 0;
        width: 100vh;
        height: 100vw;
        transform: rotate(90deg) translateY(-100%);
        transform-origin: top left;
        overflow: hidden;
      }
    }
    @media (orientation: landscape) {
      #rotateWrap {
        width: 100vw;
        height: 100vh;
      }
    }
  </style>
</head>

<body>
  <div id="rotateWrap">
  <div id="scene" tabindex="0">

    <div id="background"></div>
    <div id="monsterLayer"></div>

    <div id="character-wrap">
      <img id="character" src="images/school/person.png" alt="character" draggable="false">
    </div>

    <div id="hitVignette"></div>
    <div id="mapFade"></div>

    <div id="loadingOverlay"
      style="position:absolute;inset:0;z-index:70;background:#000;display:flex;align-items:center;justify-content:center;font-size:16px;color:#aaaaaa;letter-spacing:3px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
      加载中…
    </div>

    <div id="hud">
      <div id="sanGroup">
        <span id="sanLabel">精神值</span>
        <div id="sanTrack">
          <div id="sanFill"></div>
        </div>
        <span id="sanNum">100</span>
      </div>
      <div id="timerEl">5:00</div>
      <div id="waveEl">阶段 1 | 红:5s</div>
    </div>

    <div id="legend">
      <div class="lr">
        <div class="ld" style="background:#e03030"></div>追击者 — 碰后消失
      </div>
      <div class="lr">
        <div class="ld" style="background:#4060d0"></div>静止者 — 停下消失；移动碰扣san消失
      </div>
      <div class="lr">
        <div class="ld" style="background:#30a030"></div>潜伏者 — 站桩，靠近激活
      </div>
      <div class="lr">
        <div class="ld" style="background:#80ff30"></div>潜伏者(狂暴) — 追击，碰扣san消失
      </div>
    </div>

    <div id="keys">
      <div class="ki">移动: <span>← →</span></div>
      <div class="ki">静止者: <span>停下消失</span></div>
      <div class="ki">潜伏者: <span>往反方向跑刷出屏</span></div>
    </div>

    <div id="touchControls">
      <div class="tBtn" id="tLeft">◀</div>
      <div class="tBtn" id="tRight">▶</div>
    </div>

    <div id="overlay" style="display:none">
      <div id="ovTitle"></div>
      <div id="ovNarrative" style="display:none;font-size:15px;color:#ffffff;text-align:center;line-height:2.4;max-width:380px;letter-spacing:1px;animation:fadeInText 1.2s ease forwards;"></div>
      <div id="ovDesc"></div>
      <div style="display:flex;gap:16px;">
        <button class="btn" onclick="startGame()">再试一次</button>
        <button class="btn" onclick="window.location.href='index.html'">返回主页</button>
      </div>
    </div>

  </div>
  <script>
    /* ── 触屏检测，手机缩小角色和怪物 ── */
    const isTouchDevice = navigator.maxTouchPoints > 0;
    if (isTouchDevice) {
      const style = document.createElement('style');
      style.textContent = '#character { height: 35vh !important; } .monster img { height: 35vh !important; } #character-wrap { bottom: -16px !important; } .monster { bottom: -16px !important; }';
      document.head.appendChild(style);
    }

    /* ── DOM ── */
    const scene = document.getElementById('scene');
    const bg = document.getElementById('background');
    const charWrap = document.getElementById('character-wrap');
    const character = document.getElementById('character');
    const mLayer = document.getElementById('monsterLayer');
    const sanFill = document.getElementById('sanFill');
    const sanNum = document.getElementById('sanNum');
    const timerEl = document.getElementById('timerEl');
    const waveEl = document.getElementById('waveEl');
    const overlay = document.getElementById('overlay');
    const ovTitle = document.getElementById('ovTitle');
    const ovDesc = document.getElementById('ovDesc');
    const vignette = document.getElementById('hitVignette');
    const mapFade = document.getElementById('mapFade');

    /* ── 地图系统 ── */
    const ALL_MAPS = [
      'images/school/bg.png',
      'images/school/bg1.png',
      'images/school/bg2.png',
      'images/school/bg3.png',
      'images/school/bg4.png'
    ];
    let currentMap = 'images/school/bg.png';
    let transitioning = false;

    /* ── 屏幕尺寸（横竖屏切换时自动更新） ── */
    let SW = Math.max(window.innerWidth, window.innerHeight);
    let SH = Math.min(window.innerWidth, window.innerHeight);

    window.addEventListener('resize', () => {
      SW = Math.max(window.innerWidth, window.innerHeight);
      SH = Math.min(window.innerWidth, window.innerHeight);
    });

    const MONSTER_H = 72;
    const GROUND_BOTTOM = isTouchDevice ? -16 : -8;

    /* ── 预加载所有地图图片 ── */
    let BG_WIDTH = SW * 3;
    const preloadedMaps = {};   /* mapFile → HTMLImageElement（已解码） */

    const startBtn = document.getElementById('loadingOverlay');

    let loadedCount = 0;
    ALL_MAPS.forEach(file => {
      const img = new Image();
      const finish = () => {
        preloadedMaps[file] = img;
        loadedCount++;
        if (loadedCount === ALL_MAPS.length) {
          /* 用第一张图算初始 BG_WIDTH */
          const first = preloadedMaps['images/school/bg.png'];
          if (first && first.naturalWidth) {
            BG_WIDTH = Math.round(first.naturalWidth * (SH / first.naturalHeight));
          }
          bg.style.width = BG_WIDTH + 'px';
          bg.style.backgroundImage = `url('images/school/bg.png')`;
          /* 预加载完毕，隐藏加载屏，自动开始 */
          if (startBtn) startBtn.style.display = 'none';
          startGame();
        }
      };
      img.onload = finish;
      img.onerror = finish;
      img.src = file;
    });

    /* ── 同步切换地图（图片已在内存中，无网络请求） ── */
    function applyMap(mapFile) {
      const img = preloadedMaps[mapFile];
      if (img && img.naturalWidth) {
        BG_WIDTH = Math.round(img.naturalWidth * (SH / img.naturalHeight));
      }
      bg.style.width = BG_WIDTH + 'px';
      bg.style.backgroundImage = `url('${mapFile}')`;
    }

    /* ── 游戏常量 ── */
    const TOTAL_TIME = 300;
    const CULL_X = SW * 1.2;
    const CHAR_MARGIN = SW * 0.08;
    const LURK_RAGE = 500;
    const HIT_DIST = Math.round(SH * 0.12);  /* 约屏高12%，匹配图片实际宽度 */

    /* ── 游戏状态 ── */
    let worldX = 0;
    let pMoving = false;
    let pFacing = 1;
    let san = 100;
    let gameTime = TOTAL_TIME;
    let survived = 0;
    let running = false;
    let gameStarted = false;   /* 进入第一张新地图后才true */
    let monsters = [], mid = 0;
    let keys = {};
    let spawnTimer = 0;
    let lastTs = 0;

    /* ── 传送到随机地图（同步，不阻塞） ── */
    function teleportToRandomMap() {
      if (transitioning) return;
      transitioning = true;
      running = false;   /* 暂停游戏循环，黑屏期间不跑逻辑 */

      /* 排除当前地图，避免"假切换" */
      const others = ALL_MAPS.filter(m => m !== currentMap);
      const next = others[Math.floor(Math.random() * others.length)];

      /* 第一步：淡入黑屏（0.35s CSS transition） */
      mapFade.classList.add('fade-in');

      setTimeout(() => {
        /* 清场 */
        monsters.forEach(m => m.el.remove());
        monsters = [];
        document.querySelectorAll('.flash').forEach(e => e.remove());
        spawnTimer = 1.5;

        /* 同步切换地图（图片已预加载，无延迟） */
        currentMap = next;
        applyMap(next);

        /* 传送到地图中心 */
        worldX = BG_WIDTH / 2;
        renderPlayer();

        /* 第二步：淡出黑屏 */
        mapFade.classList.remove('fade-in');

        setTimeout(() => {
          transitioning = false;
          if (!gameStarted) gameStarted = true;   /* 第一次切图后正式开始 */
          running = true;   /* 恢复游戏循环 */
          lastTs = performance.now();
          requestAnimationFrame(gameLoop);
        }, 380);   /* 等黑屏完全淡出后解锁 */

      }, 380);   /* 等黑屏完全落下后切换内容 */
    }

    /* ── 坐标转换 ── */
    function camOffset() {
      return Math.max(0, Math.min(BG_WIDTH - SW, worldX - SW / 2));
    }
    function wx2sx(wx) { return wx - camOffset(); }

    /* ── 玩家渲染 ── */
    function renderPlayer() {
      const cam = camOffset();
      bg.style.transform = `translateX(${-cam}px)`;

      let sx = worldX - cam;
      sx = Math.max(CHAR_MARGIN, Math.min(SW - CHAR_MARGIN, sx));
      charWrap.style.left = sx + 'px';
      charWrap.style.transform = `translateX(-50%) scaleX(${pFacing})`;
      character.classList.toggle('walking', pMoving);
    }

    /* ── 怪物图片映射 ── */
    const MONSTER_IMG = {
      1: 'images/school/red.png',
      2: 'images/school/blue.png',
      3: 'images/school/green.png'
    };

    /* ── 怪物 DOM ── */
    function makeMonsterEl(type) {
      const el = document.createElement('div');
      el.className = 'monster';
      const img = document.createElement('img');
      img.src = MONSTER_IMG[type];
      img.draggable = false;
      el.appendChild(img);
      mLayer.appendChild(el);
      /* h/b 保持兼容接口，均指向 img */
      return { el, h: img, b: img };
    }

    /* ── 浮字 ── */
    function flashMsg(text, sx, cls) {
      const el = document.createElement('div');
      el.className = 'flash ' + (cls || 'dmg');
      el.textContent = text;
      el.style.left = Math.max(0, Math.min(SW - 60, sx - 20)) + 'px';
      el.style.bottom = (MONSTER_H + 20 + Math.random() * 20) + 'px';
      scene.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }

    /* ── 精神值 ── */
    function dealSan(amount, sx) {
      san = Math.max(0, san - amount);
      flashMsg(`-${amount}`, sx, 'dmg');
      vignette.classList.add('flash-hit');
      setTimeout(() => vignette.classList.remove('flash-hit'), 220);
      if (san <= 0) endGame(false);
    }

    function getRedLife() {
      return 5 + Math.floor((TOTAL_TIME - gameTime) / 60);
    }

    /* ── 生成怪物 ── */
    function spawnMonster() {
      const progress = 1 - gameTime / TOTAL_TIME;
      const r = Math.random();
      let type;
      if (progress < 0.2) type = r < 0.65 ? 1 : (r < 0.88 ? 2 : 3);
      else if (progress < 0.5) type = r < 0.45 ? 1 : (r < 0.75 ? 2 : 3);
      else type = r < 0.35 ? 1 : (r < 0.6 ? 2 : 3);

      let wx;
      if (type === 3) {
        const side = Math.random() < 0.5 ? 1 : -1;
        wx = worldX + side * (500 + Math.random() * 400);
      } else {
        const fromLeft = Math.random() < 0.5;
        wx = worldX + (fromLeft ? -(SW * 0.65) : (SW * 0.65));
      }

      const { el, h, b } = makeMonsterEl(type);
      const spd = type === 1 ? 2.5 : (type === 2 ? 1.8 : 2.8);
      const initWx = wx;
      monsters.push({
        id: mid++, type, el, h, b,
        wx,
        facing: Math.sign(worldX - initWx) || 1,
        life: type === 1 ? getRedLife() : 9999,
        enraged: false, sanCD: 0, speed: spd
      });
    }

    function getSpawnInterval() {
      const p = 1 - gameTime / TOTAL_TIME;
      return Math.max(1.0, 4.0 - p * 2.5 + (Math.random() * 0.5 - 0.25));
    }

    /* ── 怪物逻辑 ── */
    function updateMonster(m, dt) {
      if (m.sanCD > 0) m.sanCD -= dt;

      const dx = worldX - m.wx;
      const dist = Math.abs(dx);
      const sx = wx2sx(m.wx);
      const hit = dist < HIT_DIST;
      const offScreen = dist > CULL_X;

      if (m.type === 1) {
        m.life -= dt;
        m.el.style.opacity = Math.min(1, m.life / 1.2);
        if (m.life <= 0 || offScreen) return true;
        m.facing = Math.sign(dx);
        m.wx += m.facing * m.speed;
        if (hit) { dealSan(8, sx); flashMsg('消失', sx, 'ok'); return true; }
      }

      if (m.type === 2) {
        if (offScreen) return true;
        m.facing = Math.sign(dx);
        m.wx += m.facing * m.speed;
        if (hit) {
          if (!pMoving) { flashMsg('消失', sx, 'ok'); }
          else { dealSan(6, sx); flashMsg('消失', sx, 'ok'); }
          return true;
        }
      }

      if (m.type === 3) {
        if (!m.enraged) {
          if (offScreen) return true;
          if (dist < LURK_RAGE) {
            m.enraged = true;
            m.h.classList.add('rage');
            flashMsg('狂暴!', sx, 'warn');
          }
          return false;
        }
        m.facing = Math.sign(dx);
        m.wx += m.facing * m.speed * 1.15;
        if (offScreen) return true;
        if (hit && m.sanCD <= 0) {
          dealSan(10, sx);
          flashMsg('消失', sx, 'ok');
          return true;
        }
      }

      return false;
    }

    /* ── 怪物渲染 ── */
    function renderMonster(m) {
      const sx = wx2sx(m.wx);
      m.el.style.left = (sx - 36) + 'px';
      m.el.style.bottom = GROUND_BOTTOM + 'px';
      m.el.style.top = 'auto';

      /* 朝向：red/blue 默认头朝右，green 默认头朝左 */
      const f = m.facing || 1;
      const scaleX = m.type === 3 ? -f : f;
      /* 用 CSS 变量传朝向，让 monster-bob keyframe 也能拿到 */
      m.h.style.setProperty('--sx', scaleX);

      /* 没有走路动画时直接设 transform；有走路动画时由 CSS keyframe 接管 transform */
      if (m.type === 2) {
        /* 静止者：移动中播放 bob，静止时停止 */
        const isMoving = m.facing !== 0;
        m.h.classList.toggle('walking', isMoving);
        if (!isMoving) {
          m.h.style.transform = `scaleX(${scaleX})`;
        } else {
          m.h.style.transform = ''; /* 交给 CSS animation */
        }
      } else {
        m.h.style.transform = `scaleX(${scaleX})`;
      }
    }

    /* ── 主循环 ── */
    function gameLoop(ts) {
      if (!running) return;
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;

      gameTime -= dt;
      survived += dt;
      if (gameTime <= 0) { endGame(true); return; }

      /* HUD */
      const mins = Math.floor(gameTime / 60);
      const secs = Math.floor(gameTime % 60);
      if (gameStarted) {
        timerEl.textContent = `${mins}:${String(secs).padStart(2, '0')}`;
        waveEl.textContent = `阶段 ${Math.min(5, Math.floor((1 - gameTime / TOTAL_TIME) * 5) + 1)} | 红:${getRedLife()}s`;
      } else {
        gameTime = TOTAL_TIME;   /* 冻结计时 */
        survived = 0;
        timerEl.textContent = '-- : --';
        waveEl.textContent = '走到边界进入噩梦';
      }
      sanFill.style.width = san + '%';
      sanNum.textContent = Math.round(san);

      /* 输入 */
      const spd = 3.2;
      let mdx = 0;
      if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) mdx = -spd;
      if (keys['ArrowRight'] || keys['KeyD'] || touch.right) mdx = spd;
      pMoving = mdx !== 0;

      if (mdx < 0) pFacing = 1;
      else if (mdx > 0) pFacing = -1;

      const nextX = worldX + mdx;
      const EDGE = 10;
      const TRIGGER_DIST = SW * 0.1;  /* 靠近边缘约5%屏宽才触发切换 */

      /* 边界检测 → 提前触发地图切换 */
      if (!transitioning && (nextX <= TRIGGER_DIST || nextX >= BG_WIDTH - TRIGGER_DIST)) {
        teleportToRandomMap();
      } else {
        worldX = Math.max(EDGE, Math.min(BG_WIDTH - EDGE, nextX));
      }

      renderPlayer();

      /* 生成怪物（正式开始后才刷） */
      if (gameStarted) {
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
          spawnMonster();
          spawnTimer = getSpawnInterval();
        }
      }

      /* 更新&渲染怪物 */
      for (let i = monsters.length - 1; i >= 0; i--) {
        const m = monsters[i];
        if (updateMonster(m, dt)) {
          m.el.remove();
          monsters.splice(i, 1);
          continue;
        }
        renderMonster(m);
      }

      requestAnimationFrame(gameLoop);
    }

    /* ── 开始/结束 ── */
    function startGame() {
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
      san = 100;
      gameTime = TOTAL_TIME;
      survived = 0;
      currentMap = 'images/school/bg.png';
      transitioning = false;
      gameStarted = false;
      pMoving = false;
      pFacing = 1;
      monsters.forEach(m => m.el.remove());
      monsters = [];
      document.querySelectorAll('.flash').forEach(e => e.remove());
      spawnTimer = 1.5;
      mapFade.classList.remove('fade-in');
      overlay.style.display = 'none';
      applyMap('images/school/bg.png');   /* 先更新 BG_WIDTH */
      worldX = BG_WIDTH / 2;              /* 再居中 */
      running = true;
      lastTs = performance.now();
      requestAnimationFrame(gameLoop);
    }

    function endGame(won) {
      running = false;
      ovTitle.textContent = won ? '你幸存了！' : '精神崩溃';
      const ovNarrative = document.getElementById('ovNarrative');
      ovNarrative.style.display = 'block';
      ovNarrative.style.whiteSpace = 'pre-line';
      if (won) {
        ovNarrative.textContent = '你大口喘着气醒来。\n原来又是一场噩梦。\n又得去上学了……';
      } else {
        ovNarrative.textContent = '你永远迷失在了恐怖混乱的梦境中，\n再也无法醒来……';
      }
      ovDesc.innerHTML = won
        ? `坚持了完整的10分钟！<br>剩余精神值：${Math.round(san)}`
        : `精神值耗尽。<br>存活：${Math.floor(survived)} 秒`;
      overlay.style.display = 'flex';
      monsters.forEach(m => m.el.remove());
      monsters = [];
    }

    /* ── 键盘 ── */
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (['ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });
    scene.addEventListener('click', () => scene.focus());
    scene.focus();

    /* ── 触屏虚拟按键 ── */
    const touch = { left: false, right: false };

    function bindTouchBtn(id, flag) {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('touchstart', e => {
        e.preventDefault();
        touch[flag] = true;
        el.classList.add('pressed');
      }, { passive: false });
      el.addEventListener('touchend', e => {
        e.preventDefault();
        touch[flag] = false;
        el.classList.remove('pressed');
      }, { passive: false });
      el.addEventListener('touchcancel', e => {
        touch[flag] = false;
        el.classList.remove('pressed');
      });
    }

    bindTouchBtn('tLeft', 'left');
    bindTouchBtn('tRight', 'right');

    /* 防止触屏滑动整页 */
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  </script>
  </div>
  </div>
</body>

</html>
